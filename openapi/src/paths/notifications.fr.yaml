paths:
  /v2/notifications:
    get:
      summary: Obtenir la liste des notifications
      description: Récupérer une liste paginée de notifications avec filtrage optionnel
      operationId: getNotifications
      tags:
      - Notifications
      parameters:
      - name: template_type
        in: query
        description: Filtrer par type de modèle
        required: false
        schema:
          type: string
          enum:
          - sms
          - email
      - name: status
        in: query
        description: Filtrer par statut de notification
        required: false
        schema:
          type: array
          items:
            type: string
            enum:
            - created
            - in-transit
            - pending
            - sent
            - delivered
            - failed
      - name: reference
        in: query
        description: Identifiant de référence pour la notification
        required: false
        schema:
          type: string
          format: uuid
      - name: older_than
        in: query
        description: Filtrer les notifications plus anciennes que cet ID de notification
          (UUID)
        required: false
        schema:
          type: string
          format: uuid
      - name: include_jobs
        in: query
        description: Indique s’il faut inclure les tâches dans la réponse
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Notifications récupérées avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  notifications:
                    type: array
                    items:
                      $ref: '#/components/schemas/Notification'
                  links:
                    $ref: '#/components/schemas/Links'
        '401':
          description: Non autorisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                auth_error:
                  summary: Accès non autorisé
                  value:
                    status_code: 401
                    errors:
                    - error: AuthError
                      message: Non autorisé, le jeton d'authentification doit être
                        fourni
        '404':
          description: Notification non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                notification_not_found:
                  summary: Notification non trouvée
                  value:
                    result: error
                    message: Notification non trouvée dans la base de données
        '500':
          description: Erreur interne du serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                internal_server_error:
                  summary: Erreur interne du serveur
                  value:
                    result: error
                    message: Erreur interne du serveur
      security:
      - apiKey: []
  /v2/notifications/{notification-id}:
    get:
      summary: Obtenir une notification par ID
      description: Récupérer une notification spécifique par son ID
      operationId: getNotificationById
      tags:
      - Notifications
      parameters:
      - name: notification-id
        in: path
        description: Identifiant unique de la notification
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Notification récupérée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '400':
          description: Mauvaise requête - format d’ID de notification invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                status_code: 400
                errors:
                - error: ValidationError
                  message: notification_id is not a valid UUID
        '403':
          description: Interdit - erreurs d’authentification ou d’autorisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                system_clock_error:
                  summary: System clock not accurate
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Error: Your system clock must be accurate to within
                        30 seconds'
                invalid_api_key:
                  summary: Invalid API key
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Invalid token: Enter your full API key'
        '401':
          description: Non autorisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                auth_error:
                  summary: Unauthorized access
                  value:
                    status_code: 401
                    errors:
                    - error: AuthError
                      message: Unauthorized, authentication token must be provided
        '404':
          description: Notification non trouvée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                notification_not_found:
                  summary: Notification not found
                  value:
                    result: error
                    message: Notification not found in database
        '500':
          description: Erreur interne du serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                internal_server_error:
                  summary: Internal server error
                  value:
                    result: error
                    message: Internal server error
      security:
      - apiKey: []
  /v2/notifications/email:
    post:
      summary: Envoyer une notification par courriel
      description: Créer et envoyer une notification par courriel
      operationId: sendEmailNotification
      tags:
      - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmailNotificationRequest'
            examples:
              basic_email:
                summary: Notification courriel de base
                value:
                  email_address: user@example.com
                  template_id: 12345678-1234-1234-1234-123456789012
              with_personalisation:
                summary: Courriel avec variable de personnalisation
                value:
                  email_address: user@example.com
                  template_id: 12345678-1234-1234-1234-123456789012
                  personalisation:
                    first_name: John
                    last_name: Doe
              with_file_attachment:
                summary: Courriel avec pièces jointes
                value:
                  email_address: user@example.com
                  template_id: 12345678-1234-1234-1234-123456789012
                  personalisation:
                    application_file:
                      file: file as base64 encoded string
                      filename: your_custom_filename.txt
                      sending_method: attach
                    other_file:
                      file: other file as base64 encoded string
                      filename: file2.txt
                      sending_method: attach
              with_file_link:
                summary: Courriel avec lien vers un fichier
                value:
                  email_address: user@example.com
                  template_id: 12345678-1234-1234-1234-123456789012
                  personalisation:
                    link_to_file:
                      file: file as base64 encoded string
                      filename: your_custom_filename.pdf
                      sending_method: link
              scheduled_email:
                summary: Notification courriel planifiée
                value:
                  email_address: user@example.com
                  template_id: 12345678-1234-1234-1234-123456789012
                  scheduled_for: '2025-06-25T15:15:00'
      responses:
        '201':
          description: Notification courriel créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          description: Mauvaise requête - erreurs de validation ou de règles métier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                team_api_key_error:
                  summary: Team API key restriction
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Can't send to this recipient using a team-only API
                        key
                trial_mode_error:
                  summary: Service in trial mode
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Can't send to this recipient when service is in trial
                        mode
                unsupported_file_type:
                  summary: Unsupported file type
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: 'Unsupported file type ''exe''. Supported types are:
                        ''pdf, csv, txt, jpeg, png, doc, docx, xls, xlsx, rtf, odt'''
                virus_scan_failed:
                  summary: File failed virus scan
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: File did not pass the virus scan
                missing_sending_method:
                  summary: Missing sending method
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: sending_method is a required property
                missing_filename:
                  summary: Missing filename
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: filename is a required property
                invalid_sending_method:
                  summary: Invalid sending method
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: personalisation application_file sending_method is
                        not one of [attach, link]
                base64_decode_error:
                  summary: Base64 decoding error
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: 'application_file : Incorrect padding : Error decoding
                        base64 field'
                filename_too_short:
                  summary: Filename too short
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: filename is too short
                filename_too_long:
                  summary: Filename too long
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: filename is too long
        '401':
          description: Non autorisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                result: error
                message: Unauthorized
        '403':
          description: Interdit - erreurs d’authentification ou d’autorisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                system_clock_error:
                  summary: System clock not accurate
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Error: Your system clock must be accurate to within
                        30 seconds'
                invalid_api_key:
                  summary: Invalid API key
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Invalid token: Enter your full API key'
        '429':
          description: Trop de requêtes - limitation du débit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                rate_limit_exceeded:
                  summary: Rate limit exceeded
                  value:
                    status_code: 429
                    errors:
                    - error: RateLimitError
                      message: Exceeded rate limit for key type LIVE of 1000 requests
                        per 60 seconds
                send_limit_exceeded:
                  summary: Daily send limit exceeded
                  value:
                    status_code: 429
                    errors:
                    - error: TooManyRequestsError
                      message: Exceeded send limits (250000) for today
        '500':
          description: Erreur interne du serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                internal_server_error:
                  summary: Internal server error
                  value:
                    result: error
                    message: Internal server error
      security:
      - apiKey: []
  /v2/notifications/sms:
    post:
      summary: Envoyer une notification SMS
      description: Créer et envoyer une notification SMS
      operationId: sendSmsNotification
      tags:
