      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSmsNotificationRequest'
            examples:
              basic_sms:
                summary: Notification SMS de base
                value:
                  phone_number: '+1234567890'
                  template_id: 12345678-1234-1234-1234-123456789012
              sms_with_personalisation:
                summary: SMS avec variable de personnalisation
                value:
                  phone_number: '+1234567890'
                  template_id: 12345678-1234-1234-1234-123456789012
                  personalisation:
                    first_name: John
                    last_name: Doe
              scheduled_sms:
                summary: Notification SMS planifiée
                value:
                  phone_number: '+1234567890'
                  template_id: 12345678-1234-1234-1234-123456789012
                  scheduled_for: '2025-06-25T15:15:00'
      responses:
        '201':
          description: Notification SMS créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          description: Mauvaise requête - erreurs de validation ou de règles métier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                team_api_key_error:
                  summary: Team API key restriction
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Can't send to this recipient using a team-only API
                        key
                trial_mode_error:
                  summary: Service in trial mode
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Can't send to this recipient when service is in trial
                        mode
        '403':
          description: Interdit - erreurs d’authentification ou d’autorisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                system_clock_error:
                  summary: System clock not accurate
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Error: Your system clock must be accurate to within
                        30 seconds'
                invalid_api_key:
                  summary: Invalid API key
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Invalid token: Enter your full API key'
        '429':
          description: Trop de requêtes - limitation du débit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                rate_limit_exceeded:
                  summary: Rate limit exceeded
                  value:
                    status_code: 429
                    errors:
                    - error: RateLimitError
                      message: Exceeded rate limit for key type TEAM/TEST/LIVE of
                        1000 requests per 60 seconds
                send_limit_exceeded:
                  summary: Daily send limit exceeded
                  value:
                    status_code: 429
                    errors:
                    - error: TooManyRequestsError
                      message: Exceeded send limits (LIMIT NUMBER) for today
        '500':
          description: Erreur interne du serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                internal_server_error:
                  summary: Internal server error
                  value:
                    result: error
                    message: Internal server error
      security:
      - apiKey: []
  /v2/notifications/bulk:
    post:
      summary: Envoyer un lot de notifications
      description: 'Envoyez des notifications en masse, jusqu’à 50 000 destinataires
        à la fois, pour un seul modèle.


        Vous pouvez planifier l’envoi de notifications jusqu’à 4 jours à l’avance.

        '
      operationId: sendBulkNotifications
      tags:
      - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostBulkRequest'
            examples:
              basic_bulk_email_rows:
                summary: Notification groupée par courriel de base utilisant des lignes
                value:
                  template_id: 12345678-1234-1234-1234-123456789012
                  name: Rappels de rendez-vous de janvier
                  rows:
                  - - adresse courriel
                    - nom
                  - - alice@example.com
                    - Alice
                  - - bob@example.com
                    - Bob
              basic_bulk_email_csv:
                summary: Notification groupée par courriel de base utilisant un fichier
                  CSV
                value:
                  template_id: 12345678-1234-1234-1234-123456789012
                  name: Rappels de rendez-vous de janvier
                  csv: 'adresse courriel,nom

                    alice@example.com,Alice

                    bob@example.com,Bob'
              basic_bulk_sms_rows:
                summary: Notification groupée par SMS de base utilisant des lignes
                value:
                  template_id: 12345678-1234-1234-1234-123456789012
                  name: Rappels de rendez-vous de janvier
                  rows:
                  - - numéro de téléphone
                    - nom
                  - - 123-456-7890
                    - Alice
                  - - '+112345678901'
                    - Bob
              basic_bulk_sms_csv:
                summary: Notification groupée de base par SMS utilisant un fichier
                  CSV
                value:
                  template_id: 12345678-1234-1234-1234-123456789012
                  name: Rappels de rendez-vous de janvier
                  csv: 'numéro de téléphone,nom

                    123-456-7890,Alice

                    +112345678901,Bob'
              scheduled_bulk_with_ref:
                summary: Notifications groupées planifiées avec une référence pour
                  le suivi et une adresse de réponse
                value:
                  template_id: 12345678-1234-1234-1234-123456789012
                  name: Rappels de rendez-vous de janvier
                  scheduled_for: '2025-06-25T15:15:00'
                  reference: rappels-janvier
                  reply_to_id: 12345678-1234-1234-1234-123456789012
                  rows:
                  - - adresse courriel
                    - nom
                  - - alice@example.com
                    - Alice
                  - - bob@example.com
                    - Bob
      responses:
        '201':
          description: Tâche de notification en masse créée avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostBulkResponse'
        '400':
          description: Mauvaise requête
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_rows_or_csv:
                  summary: Must specify rows or csv
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: You should specify either rows or csv
                missing_name:
                  summary: Name is required
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: name is a required property
                scheduled_for_wrong_type:
                  summary: scheduled_for wrong type
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: scheduled_for 42 is not of type string, null
                scheduled_for_past:
                  summary: scheduled_for in the past
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: scheduled_for datetime cannot be in the past
                scheduled_for_too_far:
                  summary: scheduled_for too far in future
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: scheduled_for datetime can only be up to 96 hours in
                        the future
                scheduled_for_invalid_format:
                  summary: scheduled_for invalid format
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: scheduled_for datetime format is invalid. It must be
                        a valid ISO8601 date time format, https://en.wikipedia.org/wiki/ISO_8601
                template_not_found:
                  summary: Template not found
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Template not found
                template_deleted:
                  summary: Template deleted
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Template has been deleted
                service_not_allowed:
                  summary: Service not allowed to send emails
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Service is not allowed to send emails
                missing_column_headers:
                  summary: Missing column headers
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: 'Missing column headers: name'
                duplicate_column_headers:
                  summary: Duplicate column headers
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: 'Duplicate column headers: name, NAME'
                too_many_rows:
                  summary: Too many rows
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Too many rows. Maximum number of rows allowed is 50000
                team_safelist_api_key:
                  summary: Team and safelist API key restriction
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: You cannot send to these recipients because you used
                        a team and safelist API key.
                trial_mode_restriction:
                  summary: Trial mode restriction
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: You cannot send to these recipients because your service
                        is in trial mode. You can only send to members of your team
                        and your safelist.
                daily_limit_exceeded:
                  summary: Daily limit exceeded
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: You only have 50 remaining messages before you reach
                        your daily limit. You've tried to send 75 messages.
                row_errors:
                  summary: Row errors
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: 'Some rows have errors. Row 1 - name: Missing. Row
                        2 - email address: invalid recipient. Row 3 - name: Missing.
                        Row 4 - name: Missing.'
        '500':
          description: Erreur interne du serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                internal_server_error:
                  summary: Internal server error
                  value:
                    result: error
                    message: Internal server error
      security:
      - apiKey: []
