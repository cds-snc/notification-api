paths:
  /v2/manage-template/template-categories:
    get:
      summary: Get template categories
      description: 'Retrieve all available template categories for manage template
        operations.


        This endpoint requires a NEW API key with the manage_templates permission.

        '
      operationId: getManageTemplateCategories
      tags:
      - Manage Templates
      responses:
        '200':
          description: Template categories retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageTemplateCategoriesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                auth_error:
                  summary: Unauthorized access
                  value:
                    status_code: 401
                    errors:
                    - error: AuthError
                      message: Unauthorized, authentication token must be provided
        '403':
          description: Forbidden - NEW API key missing required manage_templates permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_permission:
                  summary: Missing manage templates permission
                  value:
                    status_code: 403
                    errors:
                    - error: ForbiddenError
                      message: This API key does not have permission to manage templates.
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
      security:
      - apiKey: []
  /v2/manage-template/{template-id}:
    get:
      summary: Get template by ID
      description: 'Retrieve a specific template by ID using manage template permissions.


        This endpoint requires a NEW API key with the manage_templates permission.

        '
      operationId: getManageTemplateById
      tags:
      - Manage Templates
      parameters:
      - name: template-id
        in: path
        description: Unique identifier for the template
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Template retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageTemplate'
        '400':
          description: Bad request - invalid template ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                status_code: 400
                errors:
                - error: ValidationError
                  message: id is not a valid UUID
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '403':
          description: Forbidden - NEW API key missing required manage_templates permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_permission:
                  summary: Missing manage templates permission
                  value:
                    status_code: 403
                    errors:
                    - error: ForbiddenError
                      message: This API key does not have permission to manage templates.
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                template_not_found:
                  summary: Template not found
                  value:
                    status_code: 404
                    errors:
                    - error: TemplateNotFoundError
                      message: Template not found in database
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
      security:
      - apiKey: []
    patch:
      summary: Update a template
      description: 'Update editable fields on a template, including category and parent
        folder assignment.


        This endpoint requires a NEW API key with the manage_templates permission.

        '
      operationId: patchManageTemplate
      tags:
      - Manage Templates
      parameters:
      - name: template-id
        in: path
        description: Unique identifier for the template
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageTemplatePatchRequest'
            examples:
              update_name_and_category:
                summary: Update template name and category
                value:
                  name: Follow-up reminder
                  template_category_id: 12345678-1234-1234-1234-123456789012
              move_template_to_folder:
                summary: Move template into a folder
                value:
                  parent_folder_id: 87654321-4321-4321-4321-210987654321
              remove_from_folder:
                summary: Remove template from folder
                value:
                  parent_folder_id: null
      responses:
        '200':
          description: Template updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageTemplate'
        '400':
          description: Bad request - validation or category errors
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ValidationErrorResponse'
                - $ref: '#/components/schemas/ManageTemplateCategoryErrorResponse'
              examples:
                invalid_template_id:
                  summary: Invalid template ID format
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: id is not a valid UUID
                invalid_parent_folder:
                  summary: Parent folder not found
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: parent_folder_id not found
                category_not_found:
                  summary: Template category not found
                  value:
                    status_code: 400
                    errors:
                    - error: TemplateCategoryNotFoundError
                      message: template_category_id not found
                    template_categories:
                    - template_category_id: 12345678-1234-1234-1234-123456789012
                      name: Updates
                category_invalid:
                  summary: Invalid template category value
                  value:
                    status_code: 400
                    errors:
                    - error: TemplateCategoryValidationError
                      message: template_category_id must be a valid UUID
                    template_categories:
                    - template_category_id: 12345678-1234-1234-1234-123456789012
                      name: Updates
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '403':
          description: Forbidden - NEW API key missing required manage_templates permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_permission:
                  summary: Missing manage templates permission
                  value:
                    status_code: 403
                    errors:
                    - error: ForbiddenError
                      message: This API key does not have permission to manage templates.
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
      security:
      - apiKey: []
    delete:
      summary: Archive a template
      description: 'Archive a template and remove it from any folder.


        This endpoint requires a NEW API key with the manage_templates permission.

        '
      operationId: deleteManageTemplate
      tags:
      - Manage Templates
      parameters:
      - name: template-id
        in: path
        description: Unique identifier for the template
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      responses:
        '200':
          description: Template archived successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageTemplate'
        '400':
          description: Bad request - invalid ID or already archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                invalid_template_id:
                  summary: Invalid template ID format
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: id is not a valid UUID
                already_archived:
                  summary: Template is already archived
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Template is already archived.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '403':
          description: Forbidden - NEW API key missing required manage_templates permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_permission:
                  summary: Missing manage templates permission
                  value:
                    status_code: 403
                    errors:
                    - error: ForbiddenError
                      message: This API key does not have permission to manage templates.
        '404':
          description: Template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
      security:
      - apiKey: []
  /v2/manage-template:
    post:
      summary: Create a template
      description: 'Create a new template with a required template category.


        This endpoint requires a NEW API key with the manage_templates permission

        '
      operationId: postManageTemplate
      tags:
      - Manage Templates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageTemplatePostRequest'
            examples:
              create_sms_template:
                summary: Create an SMS template
                value:
                  name: Service update
                  template_type: sms
                  content: Hello ((name)), your service update is ready.
                  template_category_id: 12345678-1234-1234-1234-123456789012
              create_email_template:
                summary: Create an email template
                value:
                  name: Service update email
                  template_type: email
                  subject: Your update
                  content: Hello ((name)), your service update is ready.
                  template_category_id: 12345678-1234-1234-1234-123456789012
                  parent_folder_id: 87654321-4321-4321-4321-210987654321
      responses:
        '201':
          description: Template created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageTemplate'
        '400':
          description: Bad request - validation, category, or content limits
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/ValidationErrorResponse'
                - $ref: '#/components/schemas/ManageTemplateCategoryErrorResponse'
              examples:
                missing_required_field:
                  summary: Required field missing
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: template_category_id is a required property
                invalid_parent_folder:
                  summary: Parent folder not found
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: parent_folder_id not found
                content_too_long:
                  summary: Content exceeds character limit
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Content has a character count greater than the limit
                        of 918
                template_name_too_long:
                  summary: Template name too long
                  value:
                    status_code: 400
                    errors:
                    - error: BadRequestError
                      message: Template name must be less than 100 characters
                category_not_found:
                  summary: Template category not found
                  value:
                    status_code: 400
                    errors:
                    - error: TemplateCategoryNotFoundError
                      message: template_category_id not found
                    template_categories:
                    - template_category_id: 12345678-1234-1234-1234-123456789012
                      name: Updates
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '403':
          description: Forbidden - NEW API key missing manage_templates permission
            or template type not allowed for service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                missing_permission:
                  summary: Missing manage templates permission
                  value:
                    status_code: 403
                    errors:
                    - error: ForbiddenError
                      message: This API key does not have permission to manage templates.
                unsupported_type:
                  summary: Service does not allow this template type
                  value:
                    status_code: 403
                    errors:
                    - error: ForbiddenError
                      message: Creating email templates is not allowed
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
      security:
      - apiKey: []
