paths:
  /v2/templates:
    get:
      summary: Obtenir la liste des modèles
      description: Récupérer une liste de modèles. Filtrable par type de modèle
      operationId: getTemplates
      tags:
      - Templates
      parameters:
      - name: type
        in: query
        description: Filtrer par type de modèle
        required: false
        schema:
          type: string
          enum:
          - sms
          - email
      responses:
        '200':
          description: Modèles récupérés avec succès
          content:
            application/json:
              schema:
                type: object
                properties:
                  templates:
                    type: array
                    items:
                      $ref: '#/components/schemas/Template'
        '400':
          description: Mauvaise requête - paramètres invalides
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                bad_request:
                  value:
                    status_code: 400
                    errors:
                    - error: ValidationError
                      message: Unauthorized, authentication token must be provided
        '401':
          description: Non autorisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erreur interne du serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - apiKey: []
  /v2/template/{template-id}:
    get:
      summary: Obtenir un modèle par ID
      description: Récupérer un modèle spécifique par son ID
      operationId: getTemplate
      tags:
      - Templates
      parameters:
      - name: template-id
        in: path
        description: Identifiant unique du modèle
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Modèle récupéré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          description: Mauvaise requête - format d’ID de modèle invalide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                status_code: 400
                errors:
                - error: ValidationError
                  message: template_id is not a valid UUID
        '401':
          description: Non autorisé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                auth_error:
                  summary: Unauthorized access
                  value:
                    status_code: 401
                    errors:
                    - error: AuthError
                      message: Unauthorized, authentication token must be provided
        '403':
          description: Interdit - erreurs d’authentification ou d’autorisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                system_clock_error:
                  summary: System clock not accurate
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Error: Your system clock must be accurate to within
                        30 seconds'
                invalid_api_key:
                  summary: Invalid API key
                  value:
                    status_code: 403
                    errors:
                    - error: AuthError
                      message: 'Invalid token: Enter your full API key'
        '404':
          description: Modèle non trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                template_not_found:
                  summary: Template not found
                  value:
                    result: error
                    message: Template not found in database
        '500':
          description: Erreur interne du serveur
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      security:
      - apiKey: []
