components:
  schemas:
    UUID:
      type: string
      format: uuid
      pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
      example: 123e4567-e89b-12d3-a456-426614174000
    Notification:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        reference:
          type: string
          nullable: true
        email_address:
          type: string
          format: email
          nullable: true
        phone_number:
          type: string
          nullable: true
        line_1:
          type: string
          nullable: true
        line_2:
          type: string
          nullable: true
        line_3:
          type: string
          nullable: true
        line_4:
          type: string
          nullable: true
        line_5:
          type: string
          nullable: true
        line_6:
          type: string
          nullable: true
        postcode:
          type: string
          nullable: true
        type:
          type: string
          enum:
          - sms
          - email
        status:
          type: string
          enum:
          - created
          - sending
          - pending
          - delivered
          - permanent-failure
          - temporary-failure
          - technical-failure
          - pending-virus-check
          - virus-scan-failed
        status_description:
          type: string
          enum:
          - En transit
          - En transit
          - En transit
          - Livré
          - Bloqué
          - Aucun numéro
          - Aucune adresse
          - Problème de contenu ou de boîte de réception
          - Problème de transporteur
          - Problème technique
          - En transit
          - Pièce jointe infectée
        provider_response:
          type: string
          nullable: true
        template:
          $ref: '#/components/schemas/NotificationTemplate'
        body:
          type: string
        subject:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        created_by_name:
          type: string
          nullable: true
        sent_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        scheduled_for:
          type: string
          format: date-time
          nullable: true
        postage:
          type: string
          nullable: true
    NotificationTemplate:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        version:
          type: integer
        uri:
          type: string
          format: uri
      required:
      - id
      - version
      - uri
    CreateEmailNotificationRequest:
      type: object
      properties:
        reference:
          type: string
          description: Identifiant de référence optionnel
        email_address:
          type: string
          format: email
          description: Adresse courriel du destinataire
        template_id:
          $ref: '#/components/schemas/UUID'
          description: ID du modèle à utiliser
        personalisation:
          type: object
          description: Variables à substituer dans le modèle et pièces jointes optionnelles
          additionalProperties:
            oneOf:
            - type: string
              description: Valeur de la variable du modèle
            - $ref: '#/components/schemas/FileAttachment'
        scheduled_for:
          type: string
          format: date-time
          nullable: true
          description: Planifier la notification pour un envoi ultérieur
        email_reply_to_id:
          $ref: '#/components/schemas/UUID'
          description: ID de l'adresse de réponse à utiliser
      required:
      - email_address
      - template_id
    CreateSmsNotificationRequest:
      type: object
      properties:
        phone_number:
          type: string
          description: Numéro de téléphone du destinataire
        template_id:
          $ref: '#/components/schemas/UUID'
          description: ID du modèle à utiliser
        personalisation:
          type: object
          description: Variables à substituer dans le modèle
          additionalProperties:
            oneOf:
            - type: string
              description: Valeur de la variable du modèle
        reference:
          type: string
          description: Identifiant de référence optionnel
        scheduled_for:
          type: string
          format: date-time
          nullable: true
          description: Planifier la notification pour un envoi ultérieur
        sms_sender_id:
          $ref: '#/components/schemas/UUID'
          description: ID de l'expéditeur SMS à utiliser
      required:
      - phone_number
      - template_id
    NotificationResponse:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
          description: Identifiant unique de la notification
        reference:
          type: string
          nullable: true
          description: Identifiant de référence fourni lors de la création de la notification
        content:
          oneOf:
          - $ref: '#/components/schemas/EmailContent'
          - $ref: '#/components/schemas/SmsContent'
          description: Contenu de la notification
        uri:
          type: string
          format: uri
          description: URI pour récupérer la notification
        template:
          $ref: '#/components/schemas/NotificationTemplate'
        scheduled_for:
          type: string
          format: date-time
          nullable: true
          description: Quand la notification est planifiée pour être envoyée
      required:
      - id
      - content
      - uri
      - template
    EmailContent:
      type: object
      properties:
        from_email:
          type: string
          format: email
          description: Adresse courriel de l'expéditeur
        body:
          type: string
          description: Corps du courriel
        subject:
          type: string
          description: Objet du courriel
      required:
      - from_email
      - body
      - subject
    SmsContent:
      type: object
      properties:
        body:
          type: string
          description: Corps du message SMS
        from_number:
          type: string
          description: Numéro de l'expéditeur
      required:
      - body
      - from_number
    FileAttachment:
      type: object
      properties:
        file:
          type: string
          description: Contenu du fichier encodé en base64
        filename:
          type: string
          description: Nom de fichier personnalisé pour la pièce jointe
        sending_method:
          type: string
          enum:
          - attach
          - link
          description: Comment le fichier doit être envoyé - en pièce jointe ou en
            lien
      required:
      - file
      - filename
      - sending_method
      example:
        file: base64encodedfilecontenthere
        filename: document.pdf
        sending_method: attach
    Template:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
          description: Identifiant unique du modèle
        name:
          type: string
          description: Nom du modèle
        description:
          type: string
          description: Description du modèle
        type:
          type: string
          enum:
          - sms
          - email
          description: Type de notification pour ce modèle
        subject:
          type: string
          description: Objet du modèle (pour courriel)
        body:
          type: string
          description: Corps du message du modèle
        personalisation:
          type: object
          description: Variables à substituer dans le modèle et pièces jointes optionnelles
          additionalProperties:
            oneOf:
            - type: string
              description: Valeur de la variable du modèle
        active:
          type: boolean
          description: Indique si le modèle est actif
        created_at:
          type: string
          format: date-time
          description: Date de création du modèle
        updated_at:
          type: string
          format: date-time
          description: Date de dernière mise à jour du modèle
        created_by:
          type: string
          description: Utilisateur ayant créé le modèle
      required:
      - id
      - name
      - type
      - body
      - active
      - created_at
    ManageTemplateCategory:
      type: object
      properties:
        template_category_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
      required:
      - template_category_id
      - name
    ManageTemplate:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        service_id:
          $ref: '#/components/schemas/UUID'
        service_name:
          type: string
        name:
          type: string
        type:
          type: string
          enum:
          - sms
          - email
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true
        created_by:
          type: string
          description: Adresse courriel de l’utilisateur qui a créé le modèle
        version:
          type: integer
        body:
          type: string
        subject:
          type: string
          nullable: true
        postage:
          type: string
          nullable: true
        template_category_id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          nullable: true
        template_category_name:
          type: string
          nullable: true
        folder_id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          nullable: true
        archived:
          type: boolean
      required:
      - id
      - service_id
      - service_name
      - name
      - type
      - created_at
      - created_by
      - version
      - body
      - archived
    ManageTemplateCategoriesResponse:
      type: object
      properties:
        template_categories:
          type: array
          items:
            $ref: '#/components/schemas/ManageTemplateCategory'
      required:
      - template_categories
    ManageTemplatePostRequest:
      type: object
      description: Le champ subject est requis lorsque template_type vaut email.
      properties:
        name:
          type: string
        template_type:
          type: string
          enum:
          - sms
          - email
        content:
          type: string
        subject:
          type: string
        template_category_id:
          $ref: '#/components/schemas/UUID'
        parent_folder_id:
          $ref: '#/components/schemas/UUID'
      required:
      - name
      - template_type
      - content
      - template_category_id
      additionalProperties: false
    ManageTemplatePatchRequest:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
        subject:
          type: string
        template_category_id:
          $ref: '#/components/schemas/UUID'
        parent_folder_id:
          allOf:
          - $ref: '#/components/schemas/UUID'
          nullable: true
      additionalProperties: false
    ManageTemplateCategoryErrorResponse:
      type: object
      properties:
        status_code:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              error:
                type: string
              message:
                type: string
            required:
            - error
            - message
        template_categories:
          type: array
          items:
            $ref: '#/components/schemas/ManageTemplateCategory'
      required:
      - status_code
      - errors
      - template_categories
    Links:
      type: object
      properties:
        current:
          type: string
          description: Lien vers la page courante
        next:
          type: string
          description: Lien vers la page suivante
      required:
      - current
    Error:
      type: object
      properties:
        result:
          type: string
          description: Résultat de la réponse
        message:
          type: string
          description: Description de l’erreur
      required:
      - result
      - message
    ValidationError:
      type: object
      properties:
        error:
          type: string
          description: Message d’erreur
        code:
          type: string
          description: Code d’erreur
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: Champ ayant échoué la validation
              message:
                type: string
                description: Message d’erreur de validation
            required:
            - field
            - message
        timestamp:
          type: string
          format: date-time
          description: Date et heure de l’erreur
      required:
      - error
      - code
      - details
      - timestamp
    ValidationErrorResponse:
      type: object
      properties:
        status_code:
          type: integer
          description: Code de statut HTTP
        errors:
          type: array
          items:
            type: object
            properties:
              error:
                type: string
                description: Type d’erreur
              message:
                type: string
                description: Message d’erreur
            required:
            - error
            - message
      required:
      - status_code
      - errors
    PostBulkRequest:
      type: object
      required:
      - template_id
      - name
      properties:
        template_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          description: Nom de votre tâche d’envoi en masse. Utilisé pour identifier
            ce lot de notifications ultérieurement.
          example: Rappels de rendez-vous de janvier
        reference:
          type: string
          description: Référence pour ce lot
          example: batch-reference-123
        csv:
          type: string
          format: binary
          description: Si vous préférez transmettre le contenu des fichiers CSV au
            lieu des lignes dans l’argument rows, vous pouvez le faire. Passez le
            contenu complet de votre fichier CSV dans une clé nommée csv. N’incluez
            pas l’argument rows.
          example: 'email address,name

            alice@example.com,Alice'
        rows:
          type: array
          description: Un tableau de tableaux. La première ligne est l’en-tête et
            doit inclure au moins l’adresse courriel si vous envoyez un modèle courriel
            ou le numéro de téléphone si vous envoyez un modèle SMS. Les autres en-têtes
            de colonnes doivent correspondre aux champs de variables personnalisées
            de votre modèle. Les lignes suivantes doivent contenir les détails de
            vos destinataires et respecter l’ordre des en-têtes de colonnes. Vous
            pouvez avoir entre 1 et 50 000 destinataires.
          items:
            type: array
            items:
              type: string
          example:
          - - email address
            - name
          - - alice@example.com
            - Alice
          - - bob@example.com
            - Bob
        scheduled_for:
          type: string
          format: date-time
          description: Si vous souhaitez envoyer des notifications dans le futur,
            vous pouvez spécifier une date et une heure jusqu’à 4 jours à l’avance,
            au format ISO 8601, heure UTC.
          example: '2023-01-01T12:00:00'
          nullable: true
        reply_to_id:
          $ref: '#/components/schemas/UUID'
          description: ID de l’adresse de réponse ou du numéro de téléphone à utiliser
          nullable: true
    PostBulkResponse:
      type: object
      properties:
        data:
          type: object
          required:
          - id
          - template
          - job_status
          - notification_count
          properties:
            id:
              $ref: '#/components/schemas/UUID'
              description: ID de la tâche d’envoi en masse
            original_file_name:
              type: string
              description: Nom du fichier CSV original si fourni
            notification_count:
              type: integer
              description: Nombre de notifications dans la tâche en masse
            template:
              $ref: '#/components/schemas/UUID'
              description: ID du modèle utilisé pour cette tâche
            template_version:
              type: integer
              description: Version du modèle utilisé pour cette tâche
            service:
              $ref: '#/components/schemas/UUID'
              description: ID du service ayant créé la tâche
            created_by:
              type: object
              properties:
                id:
                  $ref: '#/components/schemas/UUID'
                  description: ID de l’utilisateur ayant créé la tâche
                name:
                  type: string
                  description: Nom de l’utilisateur ayant créé la tâche
            created_at:
              type: string
              format: date-time
              description: Date de création de la tâche
            updated_at:
              type: string
              format: date-time
              nullable: true
              description: Date de dernière mise à jour de la tâche
            job_status:
              type: string
              enum:
              - pending
              - in progress
              - finished
              - sending limits exceeded
              - scheduled
              - cancelled
              - ready to send
              - sent to dvla
              - error
              description: Statut de la tâche d’envoi en masse
            scheduled_for:
              type: string
              format: date-time
              nullable: true
              description: Date de planification de la tâche, null si immédiat
            processing_started:
              type: string
              format: date-time
              nullable: true
              description: Date de début du traitement de la tâche
            processing_finished:
              type: string
              format: date-time
              nullable: true
              description: Date de fin du traitement de la tâche
            service_name:
              type: object
              properties:
                name:
                  type: string
                  description: Nom du service ayant créé la tâche
            template_type:
              type: string
              enum:
              - email
              - sms
              description: Type de modèle utilisé pour cette tâche (email ou sms)
            api_key:
              type: object
              nullable: true
              properties:
                id:
                  $ref: '#/components/schemas/UUID'
                  description: ID de la clé API utilisée pour créer la tâche
                name:
                  type: string
                  description: Nom de la clé API
                key_type:
                  type: string
                  enum:
                  - normal
                  - team
                  - test
                  description: Type de clé API
            archived:
              type: boolean
              description: Indique si la tâche a été archivée
            sender_id:
              $ref: '#/components/schemas/UUID'
              nullable: true
              description: ID de l'expéditeur utilisé pour cette tâche, si applicable
  responses:
    ManageTemplatesUnauthorized:
      description: Non autorisé
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    ManageTemplatesInternalServerError:
      description: Erreur interne du serveur
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    ManageTemplatesForbidden:
      description: Interdit - la NOUVELLE clé API n'a pas la permission manage_permissions
        requise (manage_templates)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
          examples:
            missing_permission:
              summary: Permission de gestion des modèles manquante
              value:
                status_code: 403
                errors:
                - error: ForbiddenError
                  message: This API key does not have permission to manage templates.
    ManageTemplateNotFound:
      description: Modèle non trouvé
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: Authorization
      description: Clé API au format « ApiKey-v1 {api_key} »
