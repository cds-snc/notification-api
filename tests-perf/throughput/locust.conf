# Default config for the throughput ceiling test.
# All values can be overridden on the command line.
# Do NOT set run-time here — the test runs indefinitely until you stop it.

headless = false          # set to true for CI / scripted runs
host = http://localhost:8080
# To target staging explicitly, pass:
#   --host https://api.staging.notification.cdssandbox.xyz

# WAF bypass header — set this to avoid rate limiting during the test:
waf-secret = your-secret-here

# Step shape defaults — override as needed:
#   --start-users  initial concurrent users
#   --step-users   users added per step
#   --step-time    seconds to hold each level
#   --spawn-rate   users spawned/s during ramp
